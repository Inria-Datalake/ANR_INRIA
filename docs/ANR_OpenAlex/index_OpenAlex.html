.sidebar {

    padding:10px;
    border-right:1px solid #ddd;
}

    width:100%;
    padding:6px;
    margin:2px 0;
    border:none;

}

<script>
function loadGraph(f){
    document.getElementById("frame").src = f;
}

function filterANR(){
    let val = document.getElementById("search").value.toLowerCase();
    let buttons = document.getElementsByClassName("anr");

    for(let b of buttons){
        b.style.display = b.innerText.toLowerCase().includes(val) ? "block" : "none";
    }
}
</script>
